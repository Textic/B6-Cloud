version: '3.8'

services:
  oracle-db:
    image: gvenzl/oracle-xe:21-slim
    container_name: library-db
    environment:
      ORACLE_PASSWORD: library_pass
    ports:
      - "1521:1521"
    volumes:
      - ./oracle-init:/container-entrypoint-initdb.d

  az-faas-usuarios:
    build: ./faas-usuarios
    container_name: az-faas-usuarios
    environment:
      AzureWebJobsStorage: UseDevelopmentStorage=false
      FUNCTIONS_WORKER_RUNTIME: java
      DB_URL: jdbc:oracle:thin:@oracle-db:1521/XE
      DB_USER: SYSTEM
      DB_PASS: library_pass
    depends_on:
      - oracle-db

  az-faas-prestamos:
    build: ./faas-prestamos
    container_name: az-faas-prestamos
    environment:
      AzureWebJobsStorage: UseDevelopmentStorage=false
      FUNCTIONS_WORKER_RUNTIME: java
      DB_URL: jdbc:oracle:thin:@oracle-db:1521/XE
      DB_USER: SYSTEM
      DB_PASS: library_pass
    depends_on:
      - oracle-db

  bff-library:
    build: ./bff-library
    container_name: bff-library
    ports:
      - "8080:8080"
    environment:
      USERS_AZURE_URL: http://az-faas-usuarios:80
      LOANS_AZURE_URL: http://az-faas-prestamos:80
    depends_on:
      - az-faas-usuarios
      - az-faas-prestamos
